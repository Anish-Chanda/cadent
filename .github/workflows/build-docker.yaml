name: Build & Publish Production Image
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from Makefile
        id: version
        run: |
          API_VERSION=$(grep '^API_VERSION' Makefile | cut -d'=' -f2 | tr -d ' ')
          BUILD_HASH=$(git rev-parse --short HEAD)
          echo "api_version=${API_VERSION}" >> $GITHUB_OUTPUT
          echo "build_hash=${BUILD_HASH}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log into GitHub Container Registry
        if: ${{ !env.ACT }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        # if: ${{ !env.ACT }}
        uses: docker/build-push-action@v5
        with:
          context: . 
          file: ./Dockerfile 
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/anish-chanda/cadent-backend:latest
            ghcr.io/anish-chanda/cadent-backend:${{ steps.version.outputs.api_version }}
          build-args: |
            API_VERSION=${{ steps.version.outputs.api_version }}
            BUILD_HASH=${{ steps.version.outputs.build_hash }}
          cache-from: type=gha
          cache-to: type=gha,mode=max